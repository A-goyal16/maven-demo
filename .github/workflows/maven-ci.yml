name: Maven CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & Test
  # ─────────────────────────────────────────────
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile --no-transfer-progress

      - name: Run Unit Tests
        run: mvn test --no-transfer-progress

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

  # ─────────────────────────────────────────────
  # Job 2: Package
  # ─────────────────────────────────────────────
  package:
    name: Package JAR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package JAR
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-demo-jar
          path: target/maven-demo-*-jar-with-dependencies.jar
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: GitHub Release (on version tags)
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Release JAR
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/maven-demo-*-jar-with-dependencies.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
